<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EASY COM Server Console</title>
  <link rel="icon" type="image/svg+xml" href="img/console-icon.svg">
  <link rel="stylesheet" href="fonts/fonts.css">
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/console.css">
  <link rel="stylesheet" href="css/settings.css">
</head>
<body>
  <div id="app">

    <div id="header">
      <div class="logo">EASY<span>COM</span> SERVER</div>
      <div id="server-url-display">http://localhost:8083</div>
      <select id="instance-select" title="Switch instance" style="display:none"></select>
      <div class="dot" id="status-dot"></div>
      <div id="dot-label">ready</div>
      <nav class="nav-links">
        <a href="index.html" class="nav-link active">Console</a>
        <a href="swagger.html" class="nav-link">API</a>
        <a href="readme.html" class="nav-link">README</a>
        <button class="nav-link nav-settings" onclick="openSettings()">&#x2699; SETTINGS</button>
      </nav>
      <a href="openapi.yaml" download class="yaml-link" style="visibility:hidden">openapi.yaml ↓</a>
    </div>

    <!-- Left sidebar: quick commands -->
    <div id="sidebar">
      <div class="group-label">Server</div>
      <button class="cmd-btn" onclick="runCmd('show server')">show server</button>
      <button class="cmd-btn" onclick="runCmd('show connections')">show connections</button>
      <button class="cmd-btn" onclick="runCmd('getlastsystemerror')">getlastsystemerror</button>
      <button class="cmd-btn" onclick="runCmd('help')">help</button>

      <div class="group-label">Connection</div>
      <button class="cmd-btn" onclick="promptAndRun('open_comport',['COM port (1,2...)','Baud rate'])">open_comport ...</button>
      <button class="cmd-btn" onclick="runCmd('close_comport')">close_comport</button>
      <button class="cmd-btn" onclick="runCmd('getcurrent_baudrate')">getcurrent_baudrate</button>
      <button class="cmd-btn" onclick="runCmd('mc_closeall')">mc_closeall</button>

      <div class="group-label">Device</div>
      <button class="cmd-btn" onclick="promptAndRun('start_program',['NET_ID'])">start_program ...</button>
      <button class="cmd-btn" onclick="promptAndRun('stop_program',['NET_ID'])">stop_program ...</button>
      <button class="cmd-btn" onclick="promptAndRun('read_clock',['NET_ID'])">read_clock ...</button>

      <div class="group-label">Process image</div>
      <button class="cmd-btn" onclick="promptAndRun('read_object_value',['NET_ID','OBJ','INDEX'])">read_object_value ...</button>
      <button class="cmd-btn" onclick="promptAndRun('write_object_value',['NET_ID','OBJ','INDEX','LENGTH','DATA'])">write_object_value ...</button>
      <button class="cmd-btn" onclick="promptAndRun('write_object_value',['NET_ID','OBJ','INDEX','LENGTH','D1|D2|MS'])">write pulse ...</button>

      <div class="group-label">Time switches</div>
      <button class="cmd-btn" onclick="promptAndRun('read_channel_7daytimeswitch',['NET_ID','INDEX','CHANNEL'])">read 7day ...</button>
      <button class="cmd-btn" onclick="promptAndRun('read_channel_yeartimeswitch',['NET_ID','INDEX','CHANNEL'])">read year ...</button>

      <div class="group-label">Security</div>
      <button class="cmd-btn" onclick="promptAndRun('unlock_device',['NET_ID','PASSWORD'])">unlock_device ...</button>
      <button class="cmd-btn" onclick="promptAndRun('lock_device',['NET_ID'])">lock_device ...</button>

      <div class="group-label">Config</div>
      <button class="cmd-btn" onclick="runCmd('show configuration com_idle_timeout')">show idle timeout</button>
      <button class="cmd-btn" onclick="promptAndRun('set configuration',['com_idle_timeout='])">set idle timeout</button>
    </div>

    <div id="main" style="display:contents;">

      <div id="console-panel">
        <div id="output"></div>
        <div id="input-bar">
          <span id="prompt">&gt;</span>
          <input id="cmd-input" type="text" placeholder="Enter command … (TAB = autocomplete)"
                 autocomplete="off" autocorrect="off" spellcheck="false">
          <button id="send-btn" onclick="sendCmd()">&#9654; SEND</button>
        </div>
        <div id="statusbar">
          <span>URL: <b id="sb-url">—</b></span>
          <span>CMDS: <b id="sb-count">0</b></span>
          <span id="status-msg">ready</span>
        </div>
      </div>

      <div id="right-panel">
        <div class="rp-tabs">
          <button class="rp-tab active" onclick="switchTab('setup',this)">SETUP</button>
          <button class="rp-tab" onclick="switchTab('history',this)">HISTORY</button>
        </div>

        <div class="rp-section active" id="tab-setup">
          <div class="sf">
            <label>Server URL</label>
            <input type="text" id="cfg-url" value="http://localhost:8083">
          </div>
          <button class="rp-btn" onclick="applySettings()">&#9654; Connect</button>
          <hr class="rp-sep">
          <div class="sf">
            <label>COM Port</label>
            <input type="number" id="cfg-comport" value="1" min="1" max="32">
          </div>
          <div class="sf">
            <label>Baud Rate</label>
            <select id="cfg-baud">
              <option>1200</option>
              <option>2400</option>
              <option>4800</option>
              <option selected>9600</option>
              <option>19200</option>
              <option>38400</option>
              <option>57600</option>
              <option>115200</option>
            </select>
          </div>
          <button class="rp-btn" onclick="openCom()">&#9654; Open COM</button>
          <hr class="rp-sep">
          <div class="sf">
            <label>Idle Timeout (s)</label>
            <input type="number" id="cfg-idle" value="300" min="0">
          </div>
          <button class="rp-btn" onclick="setIdle()">&#9654; Set</button>
          <hr class="rp-sep">
          <button class="rp-btn" onclick="runCmd('show server')">&#9654; Show Server</button>
          <button class="rp-btn" style="margin-top:.4rem" onclick="clearOutput()">&#9003; Clear Console</button>
        </div>

        <div class="rp-section" id="tab-history">
          <ul id="history-list"></ul>
        </div>
      </div>

    </div>
  </div>

  <script src="js/console.js"></script>
  <script src="js/settings.js"></script>

<!-- ── Settings modal ──────────────────────────────────────────────────── -->
<div id="cfg-overlay" class="cfg-overlay">
  <div class="cfg-dlg">
    <div class="cfg-titlebar">
      EasyComServer Konfigurator
      <button class="cfg-close" onclick="closeSettings()">&#x2715;</button>
    </div>
    <div class="cfg-top">
      <label>Konfigurationsdatei:</label>
      <input type="text" id="cfg-ini-path" readonly>
    </div>
    <div class="cfg-split">
      <div class="cfg-left">
        <ul class="cfg-list" id="cfg-list"></ul>
        <div class="cfg-list-btns">
          <button onclick="cfgAddInstance()">+ Hinzuf&#xFC;gen</button>
          <button onclick="cfgRemoveInstance()">&#x2212; Entfernen</button>
        </div>
      </div>
      <div class="cfg-right" id="cfg-editor"></div>
    </div>
    <div class="cfg-bottom">
      <fieldset class="cfg-svc">
        <legend>Server</legend>
        <span id="cfg-svc-status">&#x2026;</span>
      </fieldset>
      <div class="cfg-bottom-btns">
        <button class="cfg-btn-save" onclick="cfgSave()">&#x1F4BE;&#xA0;Speichern</button>
        <button class="cfg-btn-cancel" onclick="closeSettings()">Schlie&#xDF;en</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
