<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EASY COM Server Console</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&display=swap');

  :root {
    --bg:     #0d0f0e; --bg2: #111410; --bg3: #161a14;
    --panel:  #1a1f18; --border: #2a3028; --border2: #3a4538;
    --green:  #7bff5c; --green2: #4db83c; --green3: #2a6622;
    --amber:  #ffb830; --red: #ff4a4a; --dim: #4a5a48; --text: #c8d4c4;
    --mono:   'Share Tech Mono', monospace; --sans: 'Barlow', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100%; }

  /* ── Header ── */
  #header {
    display: flex; align-items: center; gap: 1rem;
    padding: .5rem 1rem; background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #header .logo {
    font-family: var(--mono); font-size: .7rem; letter-spacing: .2em;
    color: var(--green); text-transform: uppercase; white-space: nowrap;
  }
  #header .logo span { color: var(--dim); }
  #server-url-display {
    font-family: var(--mono); font-size: .7rem; color: var(--dim);
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); flex-shrink: 0; }
  .dot.ok  { background: var(--green); }
  .dot.err { background: var(--red); }
  .dot.busy { background: var(--amber); animation: pulse .6s infinite alternate; }
  @keyframes pulse { from { opacity: .4; } to { opacity: 1; } }
  #dot-label { font-family: var(--mono); font-size: .65rem; color: var(--dim); white-space: nowrap; }

  /* ── Main ── */
  #main { display: flex; flex: 1; min-height: 0; }

  /* ── Console ── */
  #console-panel { display: flex; flex-direction: column; flex: 1; min-width: 0; }

  #output {
    flex: 1; overflow-y: auto; padding: .75rem 1rem;
    font-family: var(--mono); font-size: .82rem; line-height: 1.6;
  }
  .line { display: block; }
  .line-cmd  { color: var(--green); }
  .line-ok   { color: var(--green2); }
  .line-err  { color: var(--red); }
  .line-info { color: var(--amber); }
  .line-sys  { color: var(--dim); }
  .line-sep  { color: var(--border2); user-select: none; }
  @keyframes fadein { from { opacity: 0; transform: translateX(-4px); } to { opacity: 1; } }
  .line { animation: fadein .12s ease-out; }

  /* ── Input bar ── */
  #input-bar {
    display: flex; align-items: center; gap: .5rem;
    padding: .5rem .75rem; background: var(--bg2);
    border-top: 1px solid var(--border); flex-shrink: 0;
  }
  #prompt { color: var(--green2); font-family: var(--mono); font-size: .85rem; user-select: none; }
  #cmd-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--green); font-family: var(--mono); font-size: .85rem; caret-color: var(--green);
  }
  #cmd-input::placeholder { color: var(--dim); }
  #send-btn {
    background: var(--green3); border: 1px solid var(--green2); color: var(--green);
    font-family: var(--mono); font-size: .7rem; letter-spacing: .1em;
    text-transform: uppercase; padding: .35rem .7rem; cursor: pointer; transition: all .15s;
  }
  #send-btn:hover { background: #1e4a1a; }

  /* ── Status bar ── */
  #statusbar {
    display: flex; gap: 1.5rem; padding: .25rem 1rem;
    background: var(--bg3); border-top: 1px solid var(--border);
    font-family: var(--mono); font-size: .62rem; color: var(--dim);
    flex-shrink: 0;
  }
  #statusbar span b { color: var(--text); }

  /* ── Right panel ── */
  #right-panel {
    width: 240px; flex-shrink: 0; border-left: 1px solid var(--border);
    display: flex; flex-direction: column; background: var(--bg2); overflow-y: auto;
  }
  .rp-tabs {
    display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .rp-tab {
    flex: 1; padding: .45rem; background: none; border: none; border-right: 1px solid var(--border);
    color: var(--dim); font-family: var(--mono); font-size: .6rem;
    letter-spacing: .1em; text-transform: uppercase; cursor: pointer; transition: all .15s;
  }
  .rp-tab:last-child { border-right: none; }
  .rp-tab.active, .rp-tab:hover { background: var(--bg3); color: var(--green); }
  .rp-section { display: none; padding: .75rem; }
  .rp-section.active { display: block; }

  /* ── Setup fields ── */
  .sf { margin-bottom: .8rem; }
  .sf label { display: block; font-size: .62rem; letter-spacing: .12em; text-transform: uppercase; color: var(--dim); margin-bottom: .3rem; }
  .sf input, .sf select {
    width: 100%; background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text); font-family: var(--mono); font-size: .8rem;
    padding: .35rem .5rem; outline: none; transition: border-color .15s;
  }
  .sf input:focus, .sf select:focus { border-color: var(--green2); }
  .rp-btn {
    width: 100%; margin-top: .3rem; background: var(--green3);
    border: 1px solid var(--green2); color: var(--green);
    font-family: var(--mono); font-size: .65rem; letter-spacing: .1em;
    text-transform: uppercase; padding: .4rem; cursor: pointer; transition: all .15s;
  }
  .rp-btn:hover { background: #1e4a1a; }
  .rp-sep { border: none; border-top: 1px solid var(--border); margin: .75rem 0; }

  /* ── History ── */
  #history-list { list-style: none; }
  #history-list li {
    padding: .3rem .4rem; font-family: var(--mono); font-size: .72rem;
    color: var(--dim); cursor: pointer; border-radius: 2px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; transition: all .1s;
  }
  #history-list li:hover { background: var(--bg3); color: var(--green); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div id="header">
    <div class="logo">EASY<span>COM</span> SERVER</div>
    <div id="server-url-display">http://localhost:8083</div>
    <div class="dot" id="status-dot"></div>
    <div id="dot-label">bereit</div>
  </div>

  <!-- Main -->
  <div id="main">

    <!-- Console -->
    <div id="console-panel">
      <div id="output"></div>
      <div id="input-bar">
        <span id="prompt">&gt;</span>
        <input id="cmd-input" type="text" placeholder="Befehl eingeben ... (TAB = Autovervollständigung)"
               autocomplete="off" autocorrect="off" spellcheck="false">
        <button id="send-btn" onclick="sendCmd()">&#9654; SENDEN</button>
      </div>
      <div id="statusbar">
        <span>URL: <b id="sb-url">—</b></span>
        <span>CMDS: <b id="sb-count">0</b></span>
        <span id="status-msg">bereit</span>
      </div>
    </div>

    <!-- Right panel -->
    <div id="right-panel">
      <div class="rp-tabs">
        <button class="rp-tab active" onclick="switchTab('setup',this)">SETUP</button>
        <button class="rp-tab" onclick="switchTab('history',this)">VERLAUF</button>
      </div>

      <!-- Setup tab -->
      <div class="rp-section active" id="tab-setup">
        <div class="sf">
          <label>Server URL</label>
          <input type="text" id="cfg-url" value="http://localhost:8083">
        </div>
        <button class="rp-btn" onclick="applySettings()">&#9654; Verbinden</button>
        <hr class="rp-sep">
        <div class="sf">
          <label>COM Port</label>
          <input type="number" id="cfg-comport" value="1" min="1" max="32">
        </div>
        <div class="sf">
          <label>Baudrate</label>
          <select id="cfg-baud">
            <option>1200</option><option>2400</option><option>4800</option>
            <option selected>9600</option><option>19200</option><option>38400</option>
            <option>57600</option><option>115200</option>
          </select>
        </div>
        <button class="rp-btn" onclick="openCom()">&#9654; COM öffnen</button>
        <hr class="rp-sep">
        <div class="sf">
          <label>Idle Timeout (s)</label>
          <input type="number" id="cfg-idle" value="300" min="0">
        </div>
        <button class="rp-btn" onclick="setIdle()">&#9654; Setzen</button>
        <hr class="rp-sep">
        <button class="rp-btn" onclick="runCmd('show server')">&#9654; Show Server</button>
        <button class="rp-btn" style="margin-top:.4rem" onclick="clearOutput()">&#9003; Konsole leeren</button>
      </div>

      <!-- History tab -->
      <div class="rp-section" id="tab-history">
        <ul id="history-list"></ul>
      </div>
    </div>

  </div><!-- /main -->
</div><!-- /app -->

<script>
// ── Config ────────────────────────────────────────────────────────────────
let cfg = { url: 'http://localhost:8083' };
let cmdHistory = [];
let histIdx = -1;
let cmdCount = 0;

const COMMANDS = [
  'open_comport','close_comport','getcurrent_baudrate',
  'set_userwaitingtime','get_userwaitingtime',
  'open_ethernetport','close_ethernetport',
  'start_program','stop_program',
  'read_clock','write_clock',
  'read_object_value','write_object_value',
  'read_channel_yeartimeswitch','write_channel_yeartimeswitch',
  'read_channel_7daytimeswitch','write_channel_7daytimeswitch',
  'unlock_device','lock_device',
  'mc_open_comport','mc_close_comport','mc_getcurrent_baudrate',
  'mc_set_userwaitingtime','mc_get_userwaitingtime',
  'mc_open_ethernetport','mc_close_ethernetport','mc_closeall',
  'mc_start_program','mc_stop_program',
  'mc_read_clock','mc_write_clock',
  'mc_read_object_value','mc_write_object_value',
  'mc_read_channel_yeartimeswitch','mc_write_channel_yeartimeswitch',
  'mc_read_channel_7daytimeswitch','mc_write_channel_7daytimeswitch',
  'mc_unlock_device','mc_lock_device',
  'getlastsystemerror',
  'show server','show connections','show configuration','show tasks',
  'set configuration','help',
];

// ── Output ────────────────────────────────────────────────────────────────
function appendLine(type, text) {
  const out = document.getElementById('output');
  if (!out) return;
  const span = document.createElement('span');
  span.className = 'line line-' + type;
  span.textContent = text;
  out.appendChild(span);
  out.scrollTop = out.scrollHeight;
}

function clearOutput() {
  document.getElementById('output').innerHTML = '';
  appendLine('sys', 'Konsole geleert - ' + new Date().toLocaleString('de'));
}

function setDot(state, label) {
  const dot = document.getElementById('status-dot');
  const lbl = document.getElementById('dot-label');
  dot.className = 'dot ' + state;
  lbl.textContent = label;
}

// ── Settings ──────────────────────────────────────────────────────────────
function applySettings() {
  cfg.url = document.getElementById('cfg-url').value.trim().replace(/\/$/, '');
  document.getElementById('sb-url').textContent = cfg.url;
  document.getElementById('server-url-display').textContent = cfg.url;
  appendLine('sys', 'Verbinde mit ' + cfg.url + ' ...');
  runCmd('show server');
}

function openCom() {
  const port = document.getElementById('cfg-comport').value;
  const baud = document.getElementById('cfg-baud').value;
  runCmd('open_comport ' + port + ' ' + baud);
}

function setIdle() {
  const v = document.getElementById('cfg-idle').value;
  runCmd('set configuration "com_idle_timeout=' + v + '"');
}

// ── Tabs ──────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.rp-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.rp-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ── Commands ──────────────────────────────────────────────────────────────
async function sendCmd() {
  const input = document.getElementById('cmd-input');
  const cmd = input.value.trim();
  if (!cmd) return;
  input.value = '';
  histIdx = -1;
  runCmd(cmd);
}

async function runCmd(cmd) {
  if (!cmd) return;
  if (cmdHistory.length === 0 || cmdHistory[0] !== cmd) {
    cmdHistory.unshift(cmd);
    if (cmdHistory.length > 80) cmdHistory.pop();
    renderHistory();
  }
  cmdCount++;
  document.getElementById('sb-count').textContent = cmdCount;

  appendLine('sep', '\u2500'.repeat(52));
  appendLine('cmd', '> ' + cmd);
  setDot('busy', 'sende ...');

  try {
    const url = cfg.url + '/easy.cmd?' + encodeURIComponent(cmd);
    const res = await fetch(url, {
      credentials: 'include',
      signal: AbortSignal.timeout(8000)
    });

    if (res.status === 401) {
      setDot('err', '401 Nicht autorisiert');
      appendLine('err', 'ERROR 401 - Bitte Seite neu laden und Zugangsdaten eingeben');
      return;
    }

    const text = (await res.text()).trim();
    text.split(/\r?\n/).forEach(l => { if (l) appendLine(classifyLine(l), l); });
    setDot('ok', 'OK');
    document.getElementById('status-msg').textContent =
      new Date().toLocaleTimeString('de') + ' - ' + cmd.split(' ')[0].toUpperCase();

  } catch (e) {
    setDot('err', 'Fehler');
    appendLine('err', 'ERROR ' + e.message);
  }
}

function classifyLine(l) {
  if (l.startsWith('OK'))    return 'ok';
  if (l.startsWith('ERROR')) return 'err';
  if (l.match(/^\d/))        return 'info';
  return 'info';
}

// ── History ───────────────────────────────────────────────────────────────
function renderHistory() {
  const ul = document.getElementById('history-list');
  ul.innerHTML = '';
  cmdHistory.forEach(cmd => {
    const li = document.createElement('li');
    li.textContent = cmd;
    li.onclick = () => {
      document.getElementById('cmd-input').value = cmd;
      document.getElementById('cmd-input').focus();
    };
    ul.appendChild(li);
  });
}

// ── Keyboard ──────────────────────────────────────────────────────────────
document.getElementById('cmd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { sendCmd(); return; }

  // History navigation
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < cmdHistory.length - 1) histIdx++;
    document.getElementById('cmd-input').value = cmdHistory[histIdx] || '';
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) histIdx--;
    else { histIdx = -1; document.getElementById('cmd-input').value = ''; return; }
    document.getElementById('cmd-input').value = cmdHistory[histIdx] || '';
    return;
  }

  // Tab autocomplete
  if (e.key === 'Tab') {
    e.preventDefault();
    const val = document.getElementById('cmd-input').value.toLowerCase();
    if (!val) return;
    const matches = COMMANDS.filter(c => c.startsWith(val));
    if (matches.length === 1) {
      document.getElementById('cmd-input').value = matches[0] + ' ';
    } else if (matches.length > 1) {
      appendLine('sys', matches.join('  '));
    }
  }
});

// ── Init ──────────────────────────────────────────────────────────────────
async function loadServerConfig() {
  try {
    // COM Port laden
    const r1 = await fetch(cfg.url + '/easy.cmd?' + encodeURIComponent('show configuration com_port'), { credentials: 'include' });
    if (r1.ok) {
      const t1 = (await r1.text()).trim().split('\n');
      // Response: "com_port=1"
      const line = t1.find(l => l.startsWith('com_port='));
      if (line) {
        const val = line.split('=')[1].trim();
        document.getElementById('cfg-comport').value = val;
      }
    }
    // Baudrate laden
    const r2 = await fetch(cfg.url + '/easy.cmd?' + encodeURIComponent('show configuration baud_rate'), { credentials: 'include' });
    if (r2.ok) {
      const t2 = (await r2.text()).trim().split('\n');
      const line = t2.find(l => l.startsWith('baud_rate='));
      if (line) {
        const val = line.split('=')[1].trim();
        const sel = document.getElementById('cfg-baud');
        for (let i = 0; i < sel.options.length; i++) {
          if (sel.options[i].value === val) { sel.selectedIndex = i; break; }
        }
      }
    }
    // Idle Timeout laden
    const r3 = await fetch(cfg.url + '/easy.cmd?' + encodeURIComponent('show configuration com_idle_timeout'), { credentials: 'include' });
    if (r3.ok) {
      const t3 = (await r3.text()).trim().split('\n');
      const line = t3.find(l => l.startsWith('com_idle_timeout='));
      if (line) {
        const val = line.split('=')[1].trim();
        document.getElementById('cfg-idle').value = val;
      }
    }
  } catch(e) { /* ignorieren falls Server noch nicht erreichbar */ }
}

(function init() {
  // Immer den aktuellen Host+Port verwenden — egal ob localhost oder IP
  const loc = window.location;
  cfg.url = loc.protocol + '//' + loc.host;
  document.getElementById('cfg-url').value = cfg.url;
  document.getElementById('sb-url').textContent = cfg.url;
  document.getElementById('server-url-display').textContent = cfg.url;

  appendLine('sys', 'EASY COM Server Console');
  appendLine('sys', 'Server: ' + cfg.url);
  appendLine('sys', new Date().toLocaleString('de'));
  appendLine('sep', '\u2500'.repeat(52));

  // Konfiguration vom Server laden und UI-Felder befuellen
  loadServerConfig();

  runCmd('show server');
  document.getElementById('cmd-input').focus();
})();
</script>
</body>
</html>
