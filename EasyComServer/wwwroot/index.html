<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EASY COM Server Console</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&display=swap');

        :root {
            --bg: #0d0f0e;
            --bg2: #111410;
            --bg3: #161a14;
            --panel: #1a1f18;
            --border: #2a3028;
            --border2: #3a4538;
            --green: #7bff5c;
            --green2: #4db83c;
            --green3: #2a6622;
            --amber: #ffb830;
            --red: #ff4a4a;
            --dim: #4a5a48;
            --text: #c8d4c4;
            --mono: 'Share Tech Mono', monospace;
            --sans: 'Barlow', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            overflow: hidden;
        }

        #app {
            display: grid;
            grid-template-columns: 200px 1fr 240px;
            grid-template-rows: 44px 1fr;
            height: 100%;
            overflow: hidden;
        }

        #header {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: .5rem 1rem;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
        }

            #header .logo {
                font-family: var(--mono);
                font-size: .7rem;
                letter-spacing: .2em;
                color: var(--green);
                text-transform: uppercase;
                white-space: nowrap;
            }

                #header .logo span {
                    color: var(--dim);
                }

        #server-url-display {
            font-family: var(--mono);
            font-size: .7rem;
            color: var(--dim);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--dim);
            flex-shrink: 0;
        }

            .dot.ok {
                background: var(--green);
            }

            .dot.err {
                background: var(--red);
            }

            .dot.busy {
                background: var(--amber);
                animation: pulse .6s infinite alternate;
            }

        @keyframes pulse {
            from {
                opacity: .4;
            }

            to {
                opacity: 1;
            }
        }

        #dot-label {
            font-family: var(--mono);
            font-size: .65rem;
            color: var(--dim);
            white-space: nowrap;
        }

        /* grid row 2: sidebar | console | right-panel */
        #console-panel {
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        #output {
            flex: 1;
            overflow-y: auto;
            padding: .75rem 1rem;
            font-family: var(--mono);
            font-size: .82rem;
            line-height: 1.6;
        }

        .line {
            display: block;
        }

        .line-cmd {
            color: var(--green);
        }

        .line-ok {
            color: var(--green2);
        }

        .line-err {
            color: var(--red);
        }

        .line-info {
            color: var(--amber);
        }

        .line-sys {
            color: var(--dim);
        }

        .line-sep {
            color: var(--border2);
            user-select: none;
        }

        @keyframes fadein {
            from {
                opacity: 0;
                transform: translateX(-4px);
            }

            to {
                opacity: 1;
            }
        }

        .line {
            animation: fadein .12s ease-out;
        }

        #input-bar {
            display: flex;
            align-items: center;
            gap: .5rem;
            padding: .5rem .75rem;
            background: var(--bg2);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        #prompt {
            color: var(--green2);
            font-family: var(--mono);
            font-size: .85rem;
            user-select: none;
        }

        #cmd-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--green);
            font-family: var(--mono);
            font-size: .85rem;
            caret-color: var(--green);
        }

            #cmd-input::placeholder {
                color: var(--dim);
            }

        #send-btn {
            background: var(--green3);
            border: 1px solid var(--green2);
            color: var(--green);
            font-family: var(--mono);
            font-size: .7rem;
            letter-spacing: .1em;
            text-transform: uppercase;
            padding: .35rem .7rem;
            cursor: pointer;
            transition: all .15s;
        }

            #send-btn:hover {
                background: #1e4a1a;
            }

        #statusbar {
            display: flex;
            gap: 1.5rem;
            padding: .25rem 1rem;
            background: var(--bg3);
            border-top: 1px solid var(--border);
            font-family: var(--mono);
            font-size: .62rem;
            color: var(--dim);
            flex-shrink: 0;
        }

            #statusbar span b {
                color: var(--text);
            }


        /* ── Left sidebar ── */
        #sidebar {
            background: var(--bg2);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            grid-row: 2;
        }

            #sidebar::-webkit-scrollbar {
                width: 3px;
            }

            #sidebar::-webkit-scrollbar-thumb {
                background: var(--border2);
            }

        .group-label {
            font-size: .58rem;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--dim);
            padding: .55rem .8rem .25rem;
        }

        .cmd-btn {
            display: block;
            width: 100%;
            background: none;
            border: none;
            border-left: 2px solid transparent;
            color: var(--text);
            font-family: var(--mono);
            font-size: .7rem;
            text-align: left;
            padding: .3rem .8rem;
            cursor: pointer;
            transition: all .12s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

            .cmd-btn:hover {
                background: var(--bg3);
                border-left-color: var(--green2);
                color: var(--green);
            }

        #right-panel {
            width: 240px;
            flex-shrink: 0;
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: var(--bg2);
            overflow-y: auto;
        }

        .rp-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .rp-tab {
            flex: 1;
            padding: .45rem;
            background: none;
            border: none;
            border-right: 1px solid var(--border);
            color: var(--dim);
            font-family: var(--mono);
            font-size: .6rem;
            letter-spacing: .1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all .15s;
        }

            .rp-tab:last-child {
                border-right: none;
            }

            .rp-tab.active, .rp-tab:hover {
                background: var(--bg3);
                color: var(--green);
            }

        .rp-section {
            display: none;
            padding: .75rem;
        }

            .rp-section.active {
                display: block;
            }

        .sf {
            margin-bottom: .8rem;
        }

            .sf label {
                display: block;
                font-size: .62rem;
                letter-spacing: .12em;
                text-transform: uppercase;
                color: var(--dim);
                margin-bottom: .3rem;
            }

            .sf input, .sf select {
                width: 100%;
                background: var(--bg3);
                border: 1px solid var(--border2);
                color: var(--text);
                font-family: var(--mono);
                font-size: .8rem;
                padding: .35rem .5rem;
                outline: none;
                transition: border-color .15s;
            }

                .sf input:focus, .sf select:focus {
                    border-color: var(--green2);
                }

        .rp-btn {
            width: 100%;
            margin-top: .3rem;
            background: var(--green3);
            border: 1px solid var(--green2);
            color: var(--green);
            font-family: var(--mono);
            font-size: .65rem;
            letter-spacing: .1em;
            text-transform: uppercase;
            padding: .4rem;
            cursor: pointer;
            transition: all .15s;
        }

            .rp-btn:hover {
                background: #1e4a1a;
            }

        .rp-sep {
            border: none;
            border-top: 1px solid var(--border);
            margin: .75rem 0;
        }

        #history-list {
            list-style: none;
        }

            #history-list li {
                padding: .3rem .4rem;
                font-family: var(--mono);
                font-size: .72rem;
                color: var(--dim);
                cursor: pointer;
                border-radius: 2px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                transition: all .1s;
            }

                #history-list li:hover {
                    background: var(--bg3);
                    color: var(--green);
                }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg2);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div id="app">

        <div id="header">
            <div class="logo">EASY<span>COM</span> SERVER</div>
            <div id="server-url-display">http://localhost:8083</div>
            <div class="dot" id="status-dot"></div>
            <div id="dot-label">ready</div>
        </div>


        <!-- Left sidebar: quick commands -->
        <div id="sidebar">
            <div class="group-label">Server</div>
            <button class="cmd-btn" onclick="runCmd('show server')">show server</button>
            <button class="cmd-btn" onclick="runCmd('show connections')">show connections</button>
            <button class="cmd-btn" onclick="runCmd('getlastsystemerror')">getlastsystemerror</button>
            <button class="cmd-btn" onclick="runCmd('help')">help</button>

            <div class="group-label">Connection</div>
            <button class="cmd-btn" onclick="promptAndRun('open_comport',['COM port (1,2...)','Baud rate'])">open_comport ...</button>
            <button class="cmd-btn" onclick="runCmd('close_comport')">close_comport</button>
            <button class="cmd-btn" onclick="runCmd('getcurrent_baudrate')">getcurrent_baudrate</button>
            <button class="cmd-btn" onclick="runCmd('mc_closeall')">mc_closeall</button>

            <div class="group-label">Device</div>
            <button class="cmd-btn" onclick="promptAndRun('start_program',['NET_ID'])">start_program ...</button>
            <button class="cmd-btn" onclick="promptAndRun('stop_program',['NET_ID'])">stop_program ...</button>
            <button class="cmd-btn" onclick="promptAndRun('read_clock',['NET_ID'])">read_clock ...</button>

            <div class="group-label">Process image</div>
            <button class="cmd-btn" onclick="promptAndRun('read_object_value',['NET_ID','OBJ','INDEX'])">read_object_value ...</button>
            <button class="cmd-btn" onclick="promptAndRun('write_object_value',['NET_ID','OBJ','INDEX','LENGTH','DATA'])">write_object_value ...</button>
            <button class="cmd-btn" onclick="promptAndRun('write_object_value',['NET_ID','OBJ','INDEX','LENGTH','D1|D2|MS'])">write pulse ...</button>

            <div class="group-label">Time switches</div>
            <button class="cmd-btn" onclick="promptAndRun('read_channel_7daytimeswitch',['NET_ID','INDEX','CHANNEL'])">read 7day ...</button>
            <button class="cmd-btn" onclick="promptAndRun('read_channel_yeartimeswitch',['NET_ID','INDEX','CHANNEL'])">read year ...</button>

            <div class="group-label">Security</div>
            <button class="cmd-btn" onclick="promptAndRun('unlock_device',['NET_ID','PASSWORD'])">unlock_device ...</button>
            <button class="cmd-btn" onclick="promptAndRun('lock_device',['NET_ID'])">lock_device ...</button>

            <div class="group-label">Config</div>
            <button class="cmd-btn" onclick="runCmd('show configuration com_idle_timeout')">show idle timeout</button>
            <button class="cmd-btn" onclick="promptAndRun('set configuration',['com_idle_timeout='])">set idle timeout</button>
        </div>

        <div id="main" style="display:contents;">

            <div id="console-panel">
                <div id="output"></div>
                <div id="input-bar">
                    <span id="prompt">&gt;</span>
                    <input id="cmd-input" type="text" placeholder="Enter command ... (TAB = autocomplete)"
                           autocomplete="off" autocorrect="off" spellcheck="false">
                    <button id="send-btn" onclick="sendCmd()">&#9654; SEND</button>
                </div>
                <div id="statusbar">
                    <span>URL: <b id="sb-url">—</b></span>
                    <span>CMDS: <b id="sb-count">0</b></span>
                    <span id="status-msg">ready</span>
                </div>
            </div>

            <div id="right-panel">
                <div class="rp-tabs">
                    <button class="rp-tab active" onclick="switchTab('setup',this)">SETUP</button>
                    <button class="rp-tab" onclick="switchTab('history',this)">HISTORY</button>
                </div>

                <div class="rp-section active" id="tab-setup">
                    <div class="sf">
                        <label>Server URL</label>
                        <input type="text" id="cfg-url" value="http://localhost:8083">
                    </div>
                    <button class="rp-btn" onclick="applySettings()">&#9654; Connect</button>
                    <hr class="rp-sep">
                    <div class="sf">
                        <label>COM Port</label>
                        <input type="number" id="cfg-comport" value="1" min="1" max="32">
                    </div>
                    <div class="sf">
                        <label>Baud Rate</label>
                        <select id="cfg-baud">
                            <option>1200</option>
                            <option>2400</option>
                            <option>4800</option>
                            <option selected>9600</option>
                            <option>19200</option>
                            <option>38400</option>
                            <option>57600</option>
                            <option>115200</option>
                        </select>
                    </div>
                    <button class="rp-btn" onclick="openCom()">&#9654; Open COM</button>
                    <hr class="rp-sep">
                    <div class="sf">
                        <label>Idle Timeout (s)</label>
                        <input type="number" id="cfg-idle" value="300" min="0">
                    </div>
                    <button class="rp-btn" onclick="setIdle()">&#9654; Set</button>
                    <hr class="rp-sep">
                    <button class="rp-btn" onclick="runCmd('show server')">&#9654; Show Server</button>
                    <button class="rp-btn" style="margin-top:.4rem" onclick="clearOutput()">&#9003; Clear Console</button>
                </div>

                <div class="rp-section" id="tab-history">
                    <ul id="history-list"></ul>
                </div>
            </div>

        </div>
    </div>

    <script>
let cfg = { url: 'http://localhost:8083' };
let cmdHistory = [];
let histIdx = -1;
let cmdCount = 0;

const COMMANDS = [
  'open_comport','close_comport','getcurrent_baudrate',
  'set_userwaitingtime','get_userwaitingtime',
  'open_ethernetport','close_ethernetport',
  'start_program','stop_program',
  'read_clock','write_clock',
  'read_object_value','write_object_value',
  'read_channel_yeartimeswitch','write_channel_yeartimeswitch',
  'read_channel_7daytimeswitch','write_channel_7daytimeswitch',
  'unlock_device','lock_device',
  'mc_open_comport','mc_close_comport','mc_getcurrent_baudrate',
  'mc_set_userwaitingtime','mc_get_userwaitingtime',
  'mc_open_ethernetport','mc_close_ethernetport','mc_closeall',
  'mc_start_program','mc_stop_program',
  'mc_read_clock','mc_write_clock',
  'mc_read_object_value','mc_write_object_value',
  'mc_read_channel_yeartimeswitch','mc_write_channel_yeartimeswitch',
  'mc_read_channel_7daytimeswitch','mc_write_channel_7daytimeswitch',
  'mc_unlock_device','mc_lock_device',
  'getlastsystemerror',
  'show server','show connections','show configuration','show tasks',
  'set configuration','help',
];

function appendLine(type, text) {
  const out = document.getElementById('output');
  if (!out) return;
  const span = document.createElement('span');
  span.className = 'line line-' + type;
  span.textContent = text;
  out.appendChild(span);
  out.scrollTop = out.scrollHeight;
}

function clearOutput() {
  document.getElementById('output').innerHTML = '';
  appendLine('sys', 'Console cleared - ' + new Date().toLocaleString('en'));
}

function setDot(state, label) {
  const dot = document.getElementById('status-dot');
  const lbl = document.getElementById('dot-label');
  dot.className = 'dot ' + state;
  lbl.textContent = label;
}

function applySettings() {
  cfg.url = document.getElementById('cfg-url').value.trim().replace(/\/$/, '');
  document.getElementById('sb-url').textContent = cfg.url;
  document.getElementById('server-url-display').textContent = cfg.url;
  appendLine('sys', 'Connecting to ' + cfg.url + ' ...');
  runCmd('show server');
}

function openCom() {
  const port = document.getElementById('cfg-comport').value;
  const baud = document.getElementById('cfg-baud').value;
  runCmd('open_comport ' + port + ' ' + baud);
}

function setIdle() {
  const v = document.getElementById('cfg-idle').value;
  runCmd('set configuration "com_idle_timeout=' + v + '"');
}

function switchTab(name, btn) {
  document.querySelectorAll('.rp-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.rp-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}


function promptAndRun(base, fields) {
  const vals = [];
  for (const f of fields) {
    const v = window.prompt(base.toUpperCase() + '\n' + f + ':');
    if (v === null) return;
    vals.push(v.trim());
  }
  runCmd(base + ' ' + vals.join(' '));
}

async function sendCmd() {
  const input = document.getElementById('cmd-input');
  const cmd = input.value.trim();
  if (!cmd) return;
  input.value = '';
  histIdx = -1;
  runCmd(cmd);
}

async function runCmd(cmd) {
  if (!cmd) return;
  if (cmdHistory.length === 0 || cmdHistory[0] !== cmd) {
    cmdHistory.unshift(cmd);
    if (cmdHistory.length > 80) cmdHistory.pop();
    renderHistory();
  }
  cmdCount++;
  document.getElementById('sb-count').textContent = cmdCount;

  appendLine('sep', '\u2500'.repeat(52));
  appendLine('cmd', '> ' + cmd);
  setDot('busy', 'sending ...');

  try {
    const url = cfg.url + '/easy.cmd?' + encodeURIComponent(cmd);
    const res = await fetch(url, {
      credentials: 'include',
      signal: AbortSignal.timeout(8000)
    });

    if (res.status === 401) {
      setDot('err', '401 Unauthorized');
      appendLine('err', 'ERROR 401 - Please reload the page and enter your credentials');
      return;
    }

    const text = (await res.text()).trim();
    text.split(/\r?\n/).forEach(l => { if (l) appendLine(classifyLine(l), l); });
    setDot('ok', 'OK');
    document.getElementById('status-msg').textContent =
      new Date().toLocaleTimeString('en') + ' - ' + cmd.split(' ')[0].toUpperCase();

  } catch (e) {
    setDot('err', 'error');
    appendLine('err', 'ERROR ' + e.message);
  }
}

function classifyLine(l) {
  if (l.startsWith('OK'))    return 'ok';
  if (l.startsWith('ERROR')) return 'err';
  if (l.match(/^\d/))        return 'info';
  return 'info';
}

function renderHistory() {
  const ul = document.getElementById('history-list');
  ul.innerHTML = '';
  cmdHistory.forEach(cmd => {
    const li = document.createElement('li');
    li.textContent = cmd;
    li.onclick = () => {
      document.getElementById('cmd-input').value = cmd;
      document.getElementById('cmd-input').focus();
    };
    ul.appendChild(li);
  });
}

document.getElementById('cmd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { sendCmd(); return; }

  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < cmdHistory.length - 1) histIdx++;
    document.getElementById('cmd-input').value = cmdHistory[histIdx] || '';
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) histIdx--;
    else { histIdx = -1; document.getElementById('cmd-input').value = ''; return; }
    document.getElementById('cmd-input').value = cmdHistory[histIdx] || '';
    return;
  }

  if (e.key === 'Tab') {
    e.preventDefault();
    const val = document.getElementById('cmd-input').value.toLowerCase();
    if (!val) return;
    const matches = COMMANDS.filter(c => c.startsWith(val));
    if (matches.length === 1) {
      document.getElementById('cmd-input').value = matches[0] + ' ';
    } else if (matches.length > 1) {
      appendLine('sys', matches.join('  '));
    }
  }
});

async function loadServerConfig() {
  try {
    const r1 = await fetch(cfg.url + '/easy.cmd?' + encodeURIComponent('show configuration com_port'), { credentials: 'include' });
    if (r1.ok) {
      const t1 = (await r1.text()).trim().split('\n');
      const line = t1.find(l => l.startsWith('com_port='));
      if (line) document.getElementById('cfg-comport').value = line.split('=')[1].trim();
    }
    const r2 = await fetch(cfg.url + '/easy.cmd?' + encodeURIComponent('show configuration baud_rate'), { credentials: 'include' });
    if (r2.ok) {
      const t2 = (await r2.text()).trim().split('\n');
      const line = t2.find(l => l.startsWith('baud_rate='));
      if (line) {
        const val = line.split('=')[1].trim();
        const sel = document.getElementById('cfg-baud');
        for (let i = 0; i < sel.options.length; i++) {
          if (sel.options[i].value === val) { sel.selectedIndex = i; break; }
        }
      }
    }
    const r3 = await fetch(cfg.url + '/easy.cmd?' + encodeURIComponent('show configuration com_idle_timeout'), { credentials: 'include' });
    if (r3.ok) {
      const t3 = (await r3.text()).trim().split('\n');
      const line = t3.find(l => l.startsWith('com_idle_timeout='));
      if (line) document.getElementById('cfg-idle').value = line.split('=')[1].trim();
    }
  } catch(e) { /* ignore if server not yet reachable */ }
}

(function init() {
  // Always use the current host and port — works for both localhost and IP addresses
  const loc = window.location;
  cfg.url = loc.protocol + '//' + loc.host;
  document.getElementById('cfg-url').value = cfg.url;
  document.getElementById('sb-url').textContent = cfg.url;
  document.getElementById('server-url-display').textContent = cfg.url;

  appendLine('sys', 'EASY COM Server Console');
  appendLine('sys', 'Server: ' + cfg.url);
  appendLine('sys', new Date().toLocaleString('en'));
  appendLine('sep', '\u2500'.repeat(52));

  // Load configuration from server and populate UI fields
  loadServerConfig();

  runCmd('show server');
  document.getElementById('cmd-input').focus();
})();
    </script>
</body>
</html>
