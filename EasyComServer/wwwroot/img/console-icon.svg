<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- terminal window -->
  <rect x="1" y="2" width="14" height="12" rx="1.5" fill="#1a1f18"/>
  <!-- title bar -->
  <rect x="1" y="2" width="14" height="3.5" rx="1.5" fill="#2a3028"/>
  <rect x="1" y="4" width="14" height="1.5" fill="#2a3028"/>
  <!-- traffic lights -->
  <circle cx="3.5" cy="3.75" r=".9" fill="#ff5f57"/>
  <circle cx="6"   cy="3.75" r=".9" fill="#febc2e"/>
  <circle cx="8.5" cy="3.75" r=".9" fill="#28c840"/>
  <!-- prompt > -->
  <path d="M3.5 8.5l2 1.5-2 1.5" fill="none" stroke="#7bff5c" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- cursor block -->
  <rect x="6.5" y="8.5" width="1.5" height="2" rx=".2" fill="#7bff5c"/>
</svg>
