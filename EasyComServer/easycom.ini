; EasyComServer configuration file
; ========================================
; Blank lines and lines starting with ; or # are ignored.
; Changes require a service restart EXCEPT settings changeable via
; SET CONFIGURATION "key=value" at runtime.

[global]
; Path to EASY_COM.dll (absolute or relative to service executable directory)
dll_path = EASY_COM.dll

; Log file (absolute or relative to service executable directory)
log_file = easycom.log

; Enable console output (useful when running with --console flag)
console_logging = true

; Seconds after which an idle COM port connection is automatically closed.
; The next command will re-open it automatically.
; 0 = never auto-close.
com_idle_timeout = 300

; ─── Instances ────────────────────────────────────────────────────────────────
; Each [instance] section defines one independent listener pair (HTTP + Telnet).
; Multiple instances allow different devices on different ports simultaneously.
; Use MC_OPEN_COMPORT/MC_CLOSE_COMPORT for truly independent COM connections.

[instance]
name            = primary
http_enabled    = true
http_port       = 8083
telnet_enabled  = true
telnet_port     = 8023

; Default COM port for auto-connect:
; When a device command arrives and no connection is open, the server
; automatically calls OPEN_COMPORT with these values.
com_port        = 1
baud_rate       = 9600

; Basic Auth for HTTP (optional).
; Set basic_auth = true and provide credentials to protect the HTTP endpoint.
; The web console (index.html) will prompt for these credentials at startup.
; Telnet is not protected by Basic Auth — use network-level access control.
basic_auth      = true
auth_user       = admin
auth_pass       = geheim

; ─── Second device example ────────────────────────────────────────────────────
;[instance]
;name            = device2
;http_enabled    = true
;http_port       = 8084
;telnet_enabled  = true
